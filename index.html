<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Visualizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('keydown', function (event) {
        if (event.shiftKey || event.altKey) return;
        var key = event.key.toLowerCase();
        var isReload = key === 'f5' || ((event.metaKey || event.ctrlKey) && key === 'r');
        if (!isReload) return;
        event.preventDefault();
        window.location.reload();
      }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>!function(){var mo=new MutationObserver(function(){var el=document.querySelector('vite-error-overlay');if(el)el.remove();});document.addEventListener('DOMContentLoaded',function(){if(document.body)mo.observe(document.body,{childList:true,subtree:true});});}();</script><script>!function(){var mo=new MutationObserver(function(){var el=document.querySelector('vite-error-overlay');if(el)el.remove();});document.addEventListener('DOMContentLoaded',function(){if(document.body)mo.observe(document.body,{childList:true,subtree:true});});}();</script></body>
</html>
